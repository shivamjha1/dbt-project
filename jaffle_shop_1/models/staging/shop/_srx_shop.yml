sources:
  - name: shop
    description: "Source configuration for the shop data, including customers and orders tables."
    database: raw
    schema: shop
    tables:
      - name: customers
        description: "Source table for customers data from the shop."
        columns:
          - name: id
            description: primary key
            data_tests:
              - not_null
              - unique
      - name: orders
        description: "Source table for orders data from the shop."
        config:
          freshness:
            warn_after: 
              count: 24
              period: hour
            error_after:
              count: 96
              period: hour
          loaded_at_field: _etl_loaded_at
