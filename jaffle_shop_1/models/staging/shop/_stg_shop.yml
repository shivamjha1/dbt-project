models:
  - name: stg_customers
    columns: 
      - name: customer_id
        data_tests:
          - not_null
          - unique 

  - name: stg_orders
    columns: 
      - name: order_id
        data_tests:
          - not_null
          - unique 
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id