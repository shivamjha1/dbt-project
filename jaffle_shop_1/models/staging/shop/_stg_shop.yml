models:
  - name: stg_customers
    description: "Staging model for customers data from the shop source."
    columns: 
      - name: customer_id
        data_tests:
          - not_null
          - unique 

  - name: stg_orders
    description: "{{ doc('order_status')}}"
    columns: 
      - name: order_id
        description: primary key
        data_tests:
          - not_null
          - unique 
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
      - name: customer_id
        description: foreign key to customers
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id